<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas TravelMundo</title>
    <link rel="stylesheet" href="styleReservas.css">
</head>

<body>
    <h1>Reservas TravelMundo</h1>
    <!-- Atenção: habilitar json-server para enviar informações do formulário -->
    <form action="http://localhost:3000/reserva" method="post">
        <label for="nome">Nome completo:</label>
        <input type="text" name="nome" id="nome">
        <label for="dataPartida">Data de partida da viagem:</label>
        <input type="date" name="dataPartida" id="dataPartida">
        <label for="numPassageiros">Número de passageiros:</label>
        <input type="number" name="numPassageiros" id="numPassageiros">
        <label for="listaPaises">País de residência:</label>
        <select name="listaPaises" id="listaPaises">
            <option value="escolha" selected disabled>Escolha uma opção</option>
            <option value="brasil">Brasil</option>
            <option value="eua">Estados Unidos</option>
            <option value="portugal">Portugal</option>
            <option value="espanha">Espanha</option>
        </select>
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email">
        <label for="refeicao">Escolha de refeição:</label>
        <select name="refeicao" id="refeicao">
            <option value="escolha" selected disabled>Escolha uma opção</option>
            <option value="padrão">Padrão</option>
            <option value="vegetariana">Vegetariana</option>
            <option value="semGluten">Sem glúten</option>
        </select>
        <label for="telefone">Número de telefone:</label>
        <input type="tel" name="telefone" id="telefone" placeholder="(12)12345-6789"
            pattern="[0-9]{2}[0-9]{5}-[0-9]{4}">
        <label for="destinos">Destino:</label>
        <select name="destinos" id="destinos">
            <option value="escolha" selected disabled>Escolha uma opção</option>
            <option value="paris">Paris</option>
            <option value="londres">Londres</option>
            <option value="novaYork">Nova York</option>
            <option value="tokyo">Tokyo</option>
        </select>
        <label for="preferenciaAssento">Preferência de assento no voo:</label>
        <select name="preferenciaAssento" id="preferenciaAssento">
            <option value="escolha" selected disabled>Escolha uma opção</option>
            <option value="janela">Janela</option>
            <option value="corredor">Corredor</option>
            <option value="proximoSaidaEmergencia">Próximo à saída de emergência</option>
        </select>
        <label for="nomeCartao">Nome conforme cartão de crédito:</label>
        <input type="text" name="nomeCartao" id="nomeCartao">
        <label for="numCartao">Número do cartão de crédito:</label>
        <input type="number" name="numCartao" id="numCartao">
        <label for="vencCartao">Vencimento do cartão de crédito:</label>
        <input type="text" name="vencCartao" id="vencCartao" placeholder="12/2023">
        <label for="cvv">CVV:</label>
        <input type="number" name="cvv" id="cvv">
        <label for="passaporte">Arquivo de passaporte digitalizado:</label>
        <input type="file" name="passaporte" id="passageiros">
        <label for="optServicos">Preferência de serviços:</label>
        <div class="prefServicos sQuarto">
            <input type="checkbox" name="servQuarto" id="servQuarto">Serviço de quarto
        </div>
        <div class="prefServicos">
            <input type="checkbox" name="translado" id="translado">Translado do aeroporto
        </div>
        <div class="prefServicos">
            <input type="checkbox" name="passeios" id="passeios">Passeios turísticos
        </div>
        <div class="botao">
            <button type="submit">Enviar</button>
        </div>
    </form>
</body>

</html>
