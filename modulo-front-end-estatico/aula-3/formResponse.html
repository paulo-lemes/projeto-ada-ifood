<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resposta do formulário</title>
</head>
<body>
    <script>
        const urlParams = window.location.search
        const campos = urlParams.replace("?","").split("&")
        
        campos.forEach((campo) => {
            campo = campo.split("=")
            console.log(`${decodeURI(campo[0])}: ${decodeURI(campo[1])}`)
            document.write(`${decodeURI(campo[0])}: ${decodeURI(campo[1])}`)
            document.write("<br>")
        })
    </script>
</body>
</html>
