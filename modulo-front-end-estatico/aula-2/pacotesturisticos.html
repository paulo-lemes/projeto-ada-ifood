<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacotes turísticos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@100;400&family=Roboto:wght@100;300&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="stylespt.css">
</head>

<body>
    <div id="pagina">
        <header>
            <h1>VANILLA VIAGENS</h1>
            <div id="imagem-titulo">
                <img src="images/pacotes.png" alt="Pacotes turísticos">
            </div>
        </header>
        <main id="pacotes">
            <a href="http://www.google.com" target="_blank">
                <div class="container">
                    <img src="images/kyoto.jpg" alt="Templo em Kyoto" class="imagem-pacote">
                    <h3 class="titulo-pacote">Kyoto - Japão</h3>
                    <p class="descricao-pacote">Pacotes à partir de R$1.999,99
                    </p>
                </div>
            </a>
            <a href="http://www.google.com" target="_blank">
                <div class="container">
                    <img src="images/paris.jpg" alt="Torre Eifel" class="imagem-pacote">
                    <h3 class="titulo-pacote">Paris - França</h3>
                    <p class="descricao-pacote">Pacotes à partir de R$2.399,99
                    </p>
                </div>
            </a>
            <a href="http://www.google.com" target="_blank">
                <div class="container">
                    <img src="images/amsterdam.jpg" alt="Amsterdam" class="imagem-pacote">
                    <h3 class="titulo-pacote">Amsterdam - Holanda</h3>
                    <p class="descricao-pacote">Pacotes à partir de R$2.299,99
                    </p>
                </div>
            </a>
            <a href="http://www.google.com" target="_blank">
                <div class="container">
                    <img src="images/sydney.jpg" alt="Sydney" class="imagem-pacote">
                    <h3 class="titulo-pacote">Sydney - Austrália</h3>
                    <p class="descricao-pacote">Pacotes à partir de R$2.199,99
                    </p>
                </div>
            </a>
        </main>
    </div>
    <footer class="rodape">
        <p>&copy; 2023 Vanilla Viagens - Todos os direitos reservados.</p>
    </footer>
</body>

</html>
