<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Exercício Aula 2 - Módulo Front End Estático</title>
</head>

<body>
    <h2>Tabela com uso de colspan e rowspan</h2>
    <div class="tabela">
        <table>
            <thead>
                <th>Produto</th>
                <th>Opção</th>
                <th>Valor</th>
            </thead>
            <tbody>
                <tr>
                    <td rowspan="2">Lápis</td>
                    <td>Grafite</td>
                    <td>R$2,00</td>
                <tr>
                    <td>Colorido</td>
                    <td>R$3,00</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="tabela">
        <table>
            <thead>
                <th colspan="2">Nome</th>
                <th>Idade</th>
            </thead>
            <tbody>
                <tr>
                    <td>Paulo</td>
                    <td>Lemes</td>
                    <td>25</td>
            </tbody>
        </table>
    </div>
    <h2>Lista ordenada e não ordenada</h2>
    <div class="lista">
        <ol>
            <li>Acordar</li>
            <li>Comer</li>
            <li>Estudar</li>
        </ol>
    </div>
    <div class="lista">
        <ul>
            <li>Fazer exercícios</li>
            <li>Ver vídeo aula</li>
            <li>Ler livro</li>
        </ul>
    </div>
</body>

</html>
